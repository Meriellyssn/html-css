<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: beige;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Login</h1>
    <form action="cadastro.php" method="post" autocomplete="on">
        <p>
            <label for="usuario">Usuário:</label>
            <input type="text" name="usuario" id="usuario" autocomplete="username" placeholder="Nome de usuário" required minlength="8" maxlength="15" size="15">
        </p>
        <p>
            <label for="senha">Senha:</label>
            <input type="password" name="senha" id="senha" autocomplete="current-password" placeholder="Senha de usuário" required minlength="8" maxlength="15" size="15">
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
